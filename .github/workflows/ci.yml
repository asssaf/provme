name: CI

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Check out repository
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Set up Python
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
      with:
        python-version: '3.13'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run linter (Ruff)
      run: |
        ruff check .

    - name: Check formatting (Ruff)
      run: |
        ruff format --check .

    - name: Set up Gleam & esbuild
      run: |
        curl -L -o gleam.tar.gz https://github.com/gleam-lang/gleam/releases/download/v1.17.0/gleam-v1.17.0-x86_64-unknown-linux-musl.tar.gz
        tar xf gleam.tar.gz
        chmod +x gleam
        sudo mv gleam /usr/local/bin/
        rm -f gleam.tar.gz
        
        curl -fsSL https://esbuild.github.io/dl/v0.20.1 | sh
        chmod +x esbuild
        sudo mv esbuild /usr/local/bin/

    - name: Verify Gleam Compilation, Bundle & Asset Integrity
      run: |
        cd src/frontend
        gleam build
        cd ../..
        esbuild src/frontend/build/dev/javascript/frontend/frontend.mjs --bundle --minify --outfile=src/static/frontend.js --format=esm
        git diff --exit-code src/static/frontend.js

    - name: Upload Gleam compilation result
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: frontend-js
        path: src/static/frontend.js

    - name: Run tests
      run: |
        python -m pytest



